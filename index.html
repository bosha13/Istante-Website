<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Istante</title>
    <meta
      name="description"
      content="Istante is a very simple stopwatch for everyday tasks and coffee enthusiasts."
    />
    <link rel="icon" href="images/icon@2x.png" />
    <link rel="stylesheet" href="styles.css" />

  <body>
    <main class="page" aria-labelledby="app-title">
      <header class="brand" aria-label="Istante">
        <img class="brand__icon" src="images/icon@2x.png" alt="" width="50" height="50" />
        <h1 id="app-title" class="brand__name">Istante</h1>

      <section class="content" aria-label="About Istante">
        <img
          class="phone"
          src="images/phone@2x.png"
          alt="Istante stopwatch app on an iPhone"

          height="550"

        <div class="copy">
          <p>Istante is a very simple stopwatch for everyday tasks and coffee enthusiasts.</p>

          <p>Made with love.</p>
        </div>
      </section>

      <a class="privacy-link" href="privacy-policy.html">Privacy Policy</a>
